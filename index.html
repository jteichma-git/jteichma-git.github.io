function render(data) {
  const list = document.getElementById('orgList');
  const noResults = document.getElementById('noResults');
  const stats = document.getElementById('stats');
  list.innerHTML = '';

  if (data.length === 0) {
    noResults.classList.remove('hidden');
    stats.textContent = '';
    return;
  }
  noResults.classList.add('hidden');

  const totalPeople = data.reduce((s, d) => s + d.people.length, 0);
  stats.textContent = `${data.length} orgs \u00b7 ${totalPeople} people`;

  data.forEach(({ org, people }) => {
    const div = document.createElement('div');
    div.className = 'org';

    const countClass = people.length >= 5 ? 'org-count large' : 'org-count';

    div.innerHTML = `
      <div class="org-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="chevron">\u25B6</span>
        <span class="org-name">${esc(org)}</span>
        <span class="${countClass}">${people.length}</span>
      </div>
      <div class="people">
        ${people.map(p => `
          <div class="person">
            <span class="person-name">${esc(p.name)}</span>
            <span class="person-title">${esc(p.title)}</span>
          </div>
        `).join('')}
      </div>
    `;
    list.appendChild(div);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function expandAll() {
  document.querySelectorAll('.org').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.org').forEach(el => el.classList.remove('open'));
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  if (!q) { render(DATA); return; }
  const filtered = DATA.map(d => {
    if (d.org.toLowerCase().includes(q)) return d;
    const matchedPeople = d.people.filter(p =>
      p.name.toLowerCase().includes(q) || p.title.toLowerCase().includes(q)
    );
    if (matchedPeople.length > 0) return { org: d.org, people: matchedPeople };
    return null;
  }).filter(Boolean);
  render(filtered);
  if (q) expandAll();
});

render(DATA);
</script>
